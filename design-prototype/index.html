<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Releasewatch — Release-scoped QA Tracker</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: {
          sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          mono: ['"JetBrains Mono"', 'ui-monospace', 'SFMono-Regular', 'monospace'],
        },
        colors: {
          border: 'hsl(214.3 31.8% 91.4%)',
          input: 'hsl(214.3 31.8% 91.4%)',
          ring: 'hsl(222.2 84% 4.9%)',
          background: 'hsl(0 0% 100%)',
          foreground: 'hsl(222.2 84% 4.9%)',
          muted: { DEFAULT: 'hsl(210 40% 96.1%)', foreground: 'hsl(215.4 16.3% 46.9%)' },
          accent: { DEFAULT: 'hsl(210 40% 96.1%)', foreground: 'hsl(222.2 47.4% 11.2%)' },
        },
      },
    },
  };
</script>

<style>
  html, body, #root { height: 100%; }
  body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; background: #fafafa; color: #0a0a0a; }
  .dark body { background: #09090b; color: #fafafa; }

  /* shadcn-ish CSS vars (light) */
  :root {
    --bg: 0 0% 100%;
    --fg: 222.2 84% 4.9%;
    --muted: 210 40% 96.1%;
    --muted-fg: 215.4 16.3% 46.9%;
    --border: 214.3 31.8% 91.4%;
    --card: 0 0% 100%;
    --card-fg: 222.2 84% 4.9%;
    --primary: 222.2 47.4% 11.2%;
    --primary-fg: 210 40% 98%;
    --accent: 210 40% 96.1%;
    --accent-fg: 222.2 47.4% 11.2%;
    --ring: 222.2 84% 4.9%;
  }
  .dark {
    --bg: 240 10% 3.9%;
    --fg: 0 0% 98%;
    --muted: 240 3.7% 15.9%;
    --muted-fg: 240 5% 64.9%;
    --border: 240 3.7% 15.9%;
    --card: 240 10% 5%;
    --card-fg: 0 0% 98%;
    --primary: 0 0% 98%;
    --primary-fg: 240 5.9% 10%;
    --accent: 240 3.7% 15.9%;
    --accent-fg: 0 0% 98%;
    --ring: 240 4.9% 83.9%;
  }

  .bg-bg { background-color: hsl(var(--bg)); }
  .text-fg { color: hsl(var(--fg)); }
  .bg-muted2 { background-color: hsl(var(--muted)); }
  .text-muted-fg { color: hsl(var(--muted-fg)); }
  .border-default { border-color: hsl(var(--border)); }
  .bg-card { background-color: hsl(var(--card)); }
  .text-card-fg { color: hsl(var(--card-fg)); }
  .bg-primary { background-color: hsl(var(--primary)); }
  .text-primary-fg { color: hsl(var(--primary-fg)); }
  .bg-accent { background-color: hsl(var(--accent)); }
  .text-accent-fg { color: hsl(var(--accent-fg)); }
  .ring-ring { --tw-ring-color: hsl(var(--ring)); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(120,120,120,0.25); border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(120,120,120,0.45); }

  /* toast slide */
  @keyframes toastIn { from { transform: translateX(110%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .toast-in { animation: toastIn 220ms cubic-bezier(0.2, 0.8, 0.2, 1); }

  /* drawer slide */
  @keyframes drawerIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
  .drawer-in { animation: drawerIn 240ms cubic-bezier(0.2, 0.8, 0.2, 1); }

  /* timeline spine */
  .spine::before {
    content: "";
    position: absolute;
    left: 15px;
    top: 0;
    bottom: 0;
    width: 1px;
    background: hsl(var(--border));
  }

  /* loading state */
  .skeleton { background: linear-gradient(90deg, hsl(var(--muted)) 0%, hsl(var(--muted)/.6) 50%, hsl(var(--muted)) 100%); background-size: 200% 100%; animation: shimmer 1.4s linear infinite; }
  @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }

  /* hide arrows in number inputs */
  input[type="number"]::-webkit-outer-spin-button, input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

  /* better default focus */
  :focus-visible { outline: 2px solid hsl(var(--ring)); outline-offset: 2px; border-radius: 6px; }

  /* prose / markdown-ish */
  .md p { margin: 0 0 0.5rem 0; }
  .md code { font-family: 'JetBrains Mono', monospace; background: hsl(var(--muted)); padding: 0.05rem 0.3rem; border-radius: 4px; font-size: 0.85em; }
  .md a { color: #2563eb; text-decoration: underline; }
  .dark .md a { color: #60a5fa; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://unpkg.com/lucide@0.453.0/dist/umd/lucide.min.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="./data.jsx"></script>
<script type="text/babel" src="./ui.jsx"></script>
<script type="text/babel" src="./components.jsx"></script>
<script type="text/babel" src="./timeline.jsx"></script>
<script type="text/babel" src="./detail.jsx"></script>
<script type="text/babel" src="./inbox.jsx"></script>
<script type="text/babel" src="./contributions.jsx"></script>
<script type="text/babel" src="./profile.jsx"></script>
<script type="text/babel" src="./tweaks-panel.jsx"></script>
<script type="text/babel" src="./screens-a.jsx"></script>
<script type="text/babel" src="./screens-b.jsx"></script>
<script type="text/babel" src="./screens-c.jsx"></script>
<script type="text/babel" src="./main.jsx"></script>
</body>
</html>
