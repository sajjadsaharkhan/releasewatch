# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Differences from base compose:
#   - Pulls pre-built images from GHCR instead of building locally
#   - PostgreSQL and Redis ports NOT exposed to the host
#   - Resource limits on every service
#   - JSON log driver with rotation
#   - api runs without --reload

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

x-ghcr-image: &ghcr-repo ghcr.io/sajjadsaharkhan/releasewatch

services:
  api:
    image: "${GHCR_REPO:-ghcr.io/sajjadsaharkhan/releasewatch}/api:${IMAGE_TAG:-latest}"
    build: null
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --workers 2
    logging: *default-logging

  worker:
    image: "${GHCR_REPO:-ghcr.io/sajjadsaharkhan/releasewatch}/api:${IMAGE_TAG:-latest}"
    build: null
    logging: *default-logging

  beat:
    image: "${GHCR_REPO:-ghcr.io/sajjadsaharkhan/releasewatch}/api:${IMAGE_TAG:-latest}"
    build: null
    logging: *default-logging

  frontend:
    image: "${GHCR_REPO:-ghcr.io/sajjadsaharkhan/releasewatch}/frontend:${IMAGE_TAG:-latest}"
    build: null
    logging: *default-logging

  postgres:
    ports: []   # not exposed in production — access via Docker network only
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    logging: *default-logging

  redis:
    ports: []   # not exposed in production
    volumes:
      - ./data/redis:/data
    logging: *default-logging
