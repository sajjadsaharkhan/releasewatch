# Alembic configuration for Releasewatch

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Use asyncpg URL — overridden in alembic/env.py from app.config
sqlalchemy.url = postgresql+asyncpg://user:pass@localhost/releasewatch

[post_write_hooks]
# Optional: auto-format generated migration files
# hooks = ruff
# ruff.type = console_scripts
# ruff.entrypoint = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
